<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northlight Gallery - 3D Environment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            max-width: 300px;
        }
        #info h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        #info p {
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 5px;
        }
        #modeSelector {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
        }
        .mode-button {
            padding: 8px 15px;
            margin: 5px 0;
            border: 2px solid #666;
            background: rgba(100, 100, 100, 0.5);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .mode-button:hover:not(:disabled) {
            background: rgba(100, 100, 100, 0.8);
            border-color: white;
        }
        .mode-button.active {
            background: rgba(0, 150, 0, 0.8);
            border-color: #00ff00;
        }
        .mode-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #debugCheckbox {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #666;
        }
        #debugCheckbox label {
            display: flex;
            align-items: center;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
        #debugCheckbox input {
            margin-right: 8px;
            cursor: pointer;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 200;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="modeSelector">
        <button class="mode-button active" id="gameModeBtn">Game Mode</button>
        <button class="mode-button" id="exploreModeBtn">Explore Mode</button>
        <div id="debugCheckbox">
            <label>
                <input type="checkbox" id="debugModeCheckbox">
                Debug Mode
            </label>
        </div>
    </div>
    <div id="info">
        <h2>Northlight Gallery</h2>
        <div id="controlsInfo">
            <p><strong>Game Mode Controls:</strong></p>
            <p>WASD / Arrow Keys - Move</p>
            <p>Mouse - Look around</p>
            <p>Click to enable</p>
            <p>ESC - Release mouse</p>
        </div>
    </div>
    <div id="loading">Loading...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue

        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 30); // 5ft eye height (scaled)
        
        // Door positions and wall colliders for game mode
        let doorPositions = {};
        let wallColliders = []; // Array of bounding boxes for collision detection

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.NoToneMapping;
        renderer.localClippingEnabled = true; // Enable local clipping for Y-axis cropping
        document.body.appendChild(renderer.domElement);

        // =====================================================
        // NAVIGATION MODE SETUP
        // =====================================================
        
        // Detect if device is mobile/touch
        const isMobileDevice = () => {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                   (navigator.maxTouchPoints && navigator.maxTouchPoints > 2);
        };
        
        const isMobile = isMobileDevice();
        let currentMode = 'explore';
        let needsRender = true;
        let isLocked = false;
        
        // UI Setup
        const gameModeBtn = document.getElementById('gameModeBtn');
        const exploreModeBtn = document.getElementById('exploreModeBtn');
        const controlsInfo = document.getElementById('controlsInfo');
        
        if (isMobile) {
            gameModeBtn.disabled = true;
        }
        
        function setMode(mode) {
            currentMode = mode;
            needsRender = true;
            
            if (mode === 'game') {
                gameModeBtn.classList.add('active');
                exploreModeBtn.classList.remove('active');
                controlsInfo.innerHTML = `
                    <p><strong>Game Mode Controls:</strong></p>
                    <p>WASD / Arrow Keys - Move</p>
                    <p>Mouse - Look around</p>
                    <p>Click to enable</p>
                    <p>ESC - Release mouse</p>
                `;
                isLocked = false;
                // Preserve current X and Z from explore mode, set to ground level (Y=5 for eye height)
                const currentX = camera.position.x;
                const currentZ = camera.position.z;
                camera.position.set(currentX, 5, currentZ);
                console.log('Switched to Game Mode at position:', camera.position);
            } else {
                gameModeBtn.classList.remove('active');
                exploreModeBtn.classList.add('active');
                controlsInfo.innerHTML = `
                    <p><strong>Explore Mode Controls:</strong></p>
                    <p>Mouse Drag - Rotate</p>
                    <p>Shift + Drag - Pan</p>
                    <p>Scroll / Pinch - Zoom</p>
                    <p>Two-finger Drag - Rotate (touch)</p>\
                `;
            }
        }
        
        gameModeBtn.addEventListener('click', () => setMode('game'));
        exploreModeBtn.addEventListener('click', () => setMode('explore'));
        
        // Initialize to explore mode
        setMode('explore');
        
        // Debug mode checkbox
        const debugCheckbox = document.getElementById('debugModeCheckbox');
        debugCheckbox.addEventListener('change', (event) => {
            debugMode = event.target.checked;
            if (modelScene) {
                updateDebugLabels(modelScene);
                needsRender = true;
            }
        });
        
        // Explore mode camera state
        let exploreCameraDistance = 70;
        let exploreCameraPan = new THREE.Vector2(0, 0);
        let exploreRotation = new THREE.Vector2(0.5, 0.5);
        let lastExploreMousePos = new THREE.Vector2(0, 0);
        let isExploreRightClick = false;

        document.body.appendChild(renderer.domElement);

        // Load the Northlight 3D model
        const gltfLoader = new GLTFLoader();
        const textureLoader = new THREE.TextureLoader();
        let modelScene = null;
        let windowModel = null;
        let frontDoorModel = null;
        let tableModel = null;
        let sofaModel = null;
        let table2Model = null;
        let sofa2Model = null;
        let sqPedestalModel = null;
        let recPedestalModel = null;
        let m2PedestalModel = null;
        let m1PedestalModel = null;
        let mSeatModel = null;
        let backdoorModel = null;
        let b1SeatModel = null;
        let b2SeatModel = null;
        const wallVisuals = new THREE.Group();
        scene.add(wallVisuals);

        // Load window model
        gltfLoader.load('./building/window.glb', (gltf) => {
            windowModel = gltf.scene;
            windowModel.scale.set(12, 12, 12);
            windowModel.rotation.y = Math.PI; // Rotate 180 degrees to face the correct direction
            windowModel.position.set(0, 0, -10);
            // make reflective material for windows
            windowModel.traverse((child) => {
                if (child.isMesh) {
                    const mats = Array.isArray(child.material) ? child.material : [child.material];
                    mats.forEach(mat => {
                        if (mat) {
                            mat.envMapIntensity = 1.0;
                            mat.metalness = 0.8;
                            mat.roughness = 0.2;
                            mat.color.set(0xffffff);
                        }
                    });
                }
            });
            console.log('Window model loaded');
        }, undefined, (error) => {
            console.error('Error loading window model:', error);
        });

        // Load front door model
        gltfLoader.load('./building/frontdoor.glb', (gltf) => {
            frontDoorModel = gltf.scene;
            frontDoorModel.scale.set(10, 10, 10);
            frontDoorModel.position.set(0, 0, 10);
            console.log('Front door model loaded');
        }, undefined, (error) => {
            console.error('Error loading front door model:', error);
        });

        // Load table model
        gltfLoader.load('./building/table.glb', (gltf) => {
            tableModel = gltf.scene;
            tableModel.scale.set(12, 12, 12);
            console.log('Table model loaded');
        }, undefined, (error) => {
            console.error('Error loading table model:', error);
        });

        // Load sofa model
        gltfLoader.load('./building/sofa.glb', (gltf) => {
            sofaModel = gltf.scene;
            sofaModel.scale.set(10, 10, 10);
            console.log('Sofa model loaded');
        }, undefined, (error) => {
            console.error('Error loading sofa model:', error);
        });

        // Load table2 model
        gltfLoader.load('./building/table2.glb', (gltf) => {
            table2Model = gltf.scene;
            table2Model.scale.set(10, 10, 10);
            console.log('Table2 model loaded');
        }, undefined, (error) => {
            console.error('Error loading table2 model:', error);
        });

        // Load sofa2 model
        gltfLoader.load('./building/sofa2.glb', (gltf) => {
            sofa2Model = gltf.scene;
            sofa2Model.scale.set(10, 10, 10);
            console.log('Sofa2 model loaded');
        }, undefined, (error) => {
            console.error('Error loading sofa2 model:', error);
        });

        // Load sqPedestal model
        gltfLoader.load('./building/sqPedestal.glb', (gltf) => {
            sqPedestalModel = gltf.scene;
            sqPedestalModel.scale.set(8, 8, 8);
            console.log('sqPedestal model loaded');
        }, undefined, (error) => {
            console.error('Error loading sqPedestal model:', error);
        });

        // Load recPedestal model
        gltfLoader.load('./building/recPedestal.glb', (gltf) => {
            recPedestalModel = gltf.scene;
            recPedestalModel.scale.set(8, 8, 8);
            console.log('recPedestal model loaded');
        }, undefined, (error) => {
            console.error('Error loading recPedestal model:', error);
        });

        // Load m2Pedestal model
        gltfLoader.load('./building/m2Pedestal.glb', (gltf) => {
            m2PedestalModel = gltf.scene;
            m2PedestalModel.scale.set(8, 8, 8);
            console.log('m2Pedestal model loaded');
        }, undefined, (error) => {
            console.error('Error loading m2Pedestal model:', error);
        });

        // Load m1Pedestal model
        gltfLoader.load('./building/m1Pedestal.glb', (gltf) => {
            m1PedestalModel = gltf.scene;
            m1PedestalModel.scale.set(8, 8, 8);
            console.log('m1Pedestal model loaded');
        }, undefined, (error) => {
            console.error('Error loading m1Pedestal model:', error);
        });

        // Load mSeat model
        gltfLoader.load('./building/mSeat.glb', (gltf) => {
            mSeatModel = gltf.scene;
            mSeatModel.scale.set(10, 10, 10);
            console.log('mSeat model loaded');
        }, undefined, (error) => {
            console.error('Error loading mSeat model:', error);
        });

        // Load backdoor model
        gltfLoader.load('./building/backdoor.glb', (gltf) => {
            backdoorModel = gltf.scene;
            backdoorModel.scale.set(10, 10, 10);
            backdoorModel.position.set(0, 0, 10);
            console.log('Backdoor model loaded');
        }, undefined, (error) => {
            console.error('Error loading backdoor model:', error);
        });

        // Load b1Seat model
        gltfLoader.load('./building/b1Seat.glb', (gltf) => {
            b1SeatModel = gltf.scene;
            b1SeatModel.scale.set(10, 10, 10);
            console.log('b1Seat model loaded');
        }, undefined, (error) => {
            console.error('Error loading b1Seat model:', error);
        });

        // Load b2Seat model
        gltfLoader.load('./building/b2Seat.glb', (gltf) => {
            b2SeatModel = gltf.scene;
            b2SeatModel.scale.set(10, 10, 10);
            console.log('b2Seat model loaded');
        }, undefined, (error) => {
            console.error('Error loading b2Seat model:', error);
        });

        gltfLoader.load('Northlight.glb', (gltf) => {
            const model = gltf.scene;
            modelScene = model;
            
            // Scale up the model
            model.scale.set(10, 10, 10);
            model.position.set(0, 14, 0);
            
            // Calculate model bounds to set up Y-axis clipping and ground footprint
            model.updateWorldMatrix(true, false);
            const modelBbox = new THREE.Box3().setFromObject(model);
            const modelHeight = modelBbox.max.y - modelBbox.min.y;
            const cropHeight = modelBbox.min.y + modelHeight * 0.7; // Keep 70% from bottom (clip top 30%)
            
            // Create clipping plane to hide top 30% (plane normal points down to keep bottom)
            modelClippingPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), cropHeight);
            

            
            // Apply clipping plane to all materials
            wallpaperMaterial.clippingPlanes = [modelClippingPlane];
            brickMaterial.clippingPlanes = [modelClippingPlane];
            whiteMaterial.clippingPlanes = [modelClippingPlane];
            greenMaterial.clippingPlanes = [modelClippingPlane];
            yellowMaterial.clippingPlanes = [modelClippingPlane];
            
            // Find door positions and wall colliders
            model.traverse((child) => {
                if (child.isMesh) {
                    // Apply clipping plane to existing materials
                    const mats = Array.isArray(child.material) ? child.material : [child.material];
                    mats.forEach(mat => {
                        if (mat) {
                            mat.clippingPlanes = [modelClippingPlane];
                        }
                    });
                    
                    const bbox = new THREE.Box3().setFromObject(child);
                    const center = bbox.getCenter(new THREE.Vector3());
                    const size = bbox.getSize(new THREE.Vector3());
                    const name = child.name.toLowerCase();
                    
                    // Store door positions
                    if (name.includes('door')) {
                        doorPositions[child.name] = center.clone();
                        console.log('Found door:', child.name, 'at position:', center);
                    }
                    
                    // Detect and store wall colliders (tall structures)
                    if (size.y > 5 && (size.x > 1 || size.z > 1)) {
                        wallColliders.push(bbox.clone());
                        console.log('Added wall collider:', child.name, 'Size:', size);
                    }
                }
            });
            
            // Apply materials to walls and windows
            colorizeModel(model);
            
            // Enable shadows on the model
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(model);
            
            // Replace windows with window.glb model (with a small delay to ensure it's loaded)
            setTimeout(() => {
                console.log('Checking models - windowModel:', !!windowModel, 'frontDoorModel:', !!frontDoorModel, 'tableModel:', !!tableModel, 'sofaModel:', !!sofaModel, 'table2Model:', !!table2Model, 'sofa2Model:', !!sofa2Model, 'sqPedestalModel:', !!sqPedestalModel, 'recPedestalModel:', !!recPedestalModel, 'm2PedestalModel:', !!m2PedestalModel, 'm1PedestalModel:', !!m1PedestalModel, 'mSeatModel:', !!mSeatModel, 'backdoorModel:', !!backdoorModel, 'b1SeatModel:', !!b1SeatModel, 'b2SeatModel:', !!b2SeatModel);
                if (windowModel) replaceWindowsWithModel(model);
                if (frontDoorModel) replaceDoorWithModel(model);
                if (backdoorModel) addBackdoorToScene();
                if (tableModel) addTableToScene();
                if (sofaModel) addSofaToScene();
                if (table2Model) addTable2ToScene();
                if (sofa2Model) addSofa2ToScene();
                if (b1SeatModel) addB1SeatToScene();
                if (b2SeatModel) addB2SeatToScene();
                if (sqPedestalModel) addSqPedestalToScene();
                if (recPedestalModel) addRecPedestalToScene();
                if (m2PedestalModel) addM2PedestalToScene();
                if (m1PedestalModel) addM1PedestalToScene();
                if (mSeatModel) addMSeatToScene();
                needsRender = true; // Trigger render after models are added
            }, 500);
            
            // Update debug labels if needed
            updateDebugLabels(model);
            
            // Trigger render now that model is loaded
            needsRender = true;
        }, undefined, (error) => {
            console.error('Error loading Northlight model:', error);
        });

        // Exterior ground
        const groundGeometry = new THREE.PlaneGeometry(84.8, 186);
        const floorTexture = textureLoader.load('./building/floor.jpg');
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            map: floorTexture,
            roughness: 0.5
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.set(-1, -1.8, -49.4);
        ground.receiveShadow = true;
        scene.add(ground);

        // Add sky blue box
        const boxGeometry = new THREE.BoxGeometry(34, 1, 15);
        const boxMaterial = new THREE.MeshBasicMaterial({ color: 0x87CEEB });
        const box = new THREE.Mesh(boxGeometry, boxMaterial);
        box.position.set(-28.3, -1, 40.5);
        scene.add(box);

        // =====================================================
        // LIGHTING
        // =====================================================

        
        // Ambient light for overall illumination
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);
        
        // Directional light from above (like natural light through windows)
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(50, 50, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.left = -100;
        directionalLight.shadow.camera.right = 100;
        directionalLight.shadow.camera.top = 100;
        directionalLight.shadow.camera.bottom = -100;
        scene.add(directionalLight);
        
        // Fill light from another direction
        const fillLight = new THREE.DirectionalLight(0xffffff, 0.2);
        fillLight.position.set(-50, 30, -50);
        scene.add(fillLight);

        // =====================================================
        // MODEL COLORIZATION
        // =====================================================
        
        // Create clipping plane for Y-axis cropping (will be populated after model loads)
        let modelClippingPlane = null;
        
        const wallTexture = textureLoader.load('./building/wall.jpg');
        wallTexture.wrapS = THREE.RepeatWrapping;
        wallTexture.wrapT = THREE.RepeatWrapping;
        wallTexture.repeat.set(1, 1);
        
        const wallpaperMaterial = new THREE.MeshBasicMaterial({
            map: wallTexture,
            color: 0xffffff,
            side: THREE.DoubleSide
        });

        const brickTexture = textureLoader.load('./building/brick.jpg');
        brickTexture.wrapS = THREE.RepeatWrapping;
        brickTexture.wrapT = THREE.RepeatWrapping;
        brickTexture.repeat.set(2, 3);

        const brickMaterial = new THREE.MeshStandardMaterial({
            map: brickTexture,
            roughness: 0.9,
            metalness: 0.0,
            vertexColors: false
        });
        
        const whiteMaterial = new THREE.MeshBasicMaterial({
            color: 0xf0f0f0,
            side: THREE.DoubleSide
        });
        
        const skyBlueMaterial = new THREE.MeshBasicMaterial({
            color: 0x87CEEB,
            side: THREE.DoubleSide
        });
        
        const greenMaterial = new THREE.MeshStandardMaterial({
            color: 0x00ff00,
            roughness: 0.5,
            metalness: 0.1,
            emissive: 0x003300
        });
        
        const yellowMaterial = new THREE.MeshStandardMaterial({
            color: 0xffff00,
            roughness: 0.6,
            metalness: 0.1,
            emissive: 0x333300
        });
        
        // Create procedural brick texture for Wall0
        function createBrickTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            const brickWidth = 45;
            const brickHeight = 25;
            const mortar = 1;
            const brickColor = '#6B3410';  // Dark brick red
            const mortarColor = '#D3B7A0';  // Natural mortar tan
            
            // Fill background with mortar color
            ctx.fillStyle = mortarColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw bricks
            for (let y = 0; y < canvas.height; y += brickHeight + mortar) {
                const offset = ((y / (brickHeight + mortar)) % 2) * (brickWidth / 2);
                for (let x = -offset; x < canvas.width; x += brickWidth + mortar) {
                    ctx.fillStyle = brickColor;
                    ctx.fillRect(x, y, brickWidth, brickHeight);
                    
                    // Add brick texture variation - darker shadows
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(x, y, brickWidth, 2);
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    ctx.fillRect(x, y, 2, brickHeight);
                    
                    // Add highlight on bottom and right
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.fillRect(x, y + brickHeight - 2, brickWidth, 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.fillRect(x + brickWidth - 2, y, 2, brickHeight);
                }
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.LinearFilter;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            return texture;
        }
        
        const wall1Material = new THREE.MeshBasicMaterial({
            map: brickTexture,
            color: 0xffffff,
            side: THREE.DoubleSide
        });
        wall1Material.needsUpdate = true;
        
        // Create procedural rough clay texture for pedestals (TSL-inspired)
        function createRoughClayTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Base clay color (warm terracotta)
            ctx.fillStyle = '#ccc0b0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Settings
            const scale = 2;
            const bump = 0.5;
            const curvature = 0.2;
            
            // Create stroke patterns for rough clay texture
            for (let i = 0; i < 150; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const length = Math.random() * 40 * scale + 20 * scale;
                const angle = Math.random() * Math.PI * 2;
                
                ctx.strokeStyle = `rgba(0, 0, 0, ${0.05 + Math.random() * 0.15})`;
                ctx.lineWidth = Math.random() * 3 + 1;
                ctx.beginPath();
                ctx.moveTo(x, y);
                
                // Create curved strokes
                const controlX = x + Math.cos(angle) * length * 0.5;
                const controlY = y + Math.sin(angle) * length * 0.5;
                const endX = x + Math.cos(angle) * length;
                const endY = y + Math.sin(angle) * length;
                
                ctx.quadraticCurveTo(controlX + (Math.random() - 0.5) * curvature * length, 
                                     controlY + (Math.random() - 0.5) * curvature * length,
                                     endX, endY);
                ctx.stroke();
            }
            
            // Add bumps and texture areas
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radius = Math.random() * 15 * bump + 5;
                
                ctx.fillStyle = `rgba(${Math.random() * 40 + 100}, ${Math.random() * 30 + 80}, ${Math.random() * 30 + 50}, ${0.1 + Math.random() * 0.2})`;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Add clay grain/speckle pattern
            for (let i = 0; i < 3000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;

        // Create procedural stars texture
        function createStarsTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Dark background (00001d)
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Star color (ffe8de - warm white/beige)
            const starColor = '#dedede';
            
            // Settings
            const scale = 2;
            const density = .1;
            const variation = 0;
            
            // Generate stars
            const numStars = Math.floor(canvas.width * canvas.height * density / 100);
            for (let i = 0; i < numStars; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radius = Math.random() * scale * 0.5 + 0.5;
                const opacity = 0.3 + Math.random() * (1 - variation * 0.3);
                
                ctx.fillStyle = starColor;
                ctx.globalAlpha = opacity;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
            
            // Add some glow to stars
            for (let i = 0; i < numStars * 0.3; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radius = Math.random() * scale * 1.5 + 1;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.2)');
                gradient.addColorStop(1, 'rgba(0, 0, 29, 0)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.LinearFilter;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            return texture;
        }

        // Create procedural roman paving texture
        function createRomanPavingTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Mortar color (light grey)
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Stone colors palette
            const stoneColors = ['#9b8b77', '#a89784', '#8b7b6b', '#b5a595', '#a08070'];
            
            // Settings
            const scale = 2;
            const depth = 0.5;
            
            // Draw roman paving stones - rectangular pattern
            const stoneWidth = 80 / scale;
            const stoneHeight = 50 / scale;
            const mortarWidth = 2;
            
            for (let y = 0; y < canvas.height; y += stoneHeight + mortarWidth) {
                // Offset every other row for brick-like pattern
                const offset = ((y / (stoneHeight + mortarWidth)) % 2) * (stoneWidth / 2);
                for (let x = -offset; x < canvas.width; x += stoneWidth + mortarWidth) {
                    // Random stone color
                    const color = stoneColors[Math.floor(Math.random() * stoneColors.length)];
                    ctx.fillStyle = color;
                    ctx.fillRect(x, y, stoneWidth, stoneHeight);
                    
                    // Add shadow/depth on top and left
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                    ctx.fillRect(x, y, stoneWidth, 2);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                    ctx.fillRect(x, y, 2, stoneHeight);
                    
                    // Add highlight on bottom and right
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.fillRect(x, y + stoneHeight - 2, stoneWidth, 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                    ctx.fillRect(x + stoneWidth - 2, y, 2, stoneHeight);
                    
                    // Add subtle variation/texture within stone
                    for (let i = 0; i < 3; i++) {
                        const spotX = x + Math.random() * stoneWidth;
                        const spotY = y + Math.random() * stoneHeight;
                        ctx.fillStyle = `rgba(0, 0, 0, ${0.05 * Math.random()})`;
                        ctx.fillRect(spotX, spotY, 3, 3);
                    }
                }
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.LinearFilter;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            return texture;
        }

        // Create procedural satin texture
        function createSatinTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Dark background (000014)
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Main satin color (2937ff - deep blue)
            const satinColor = '#000000';
            
            // Settings
            const scale = 200;
            
            // Create satin sheen effect with diagonal lines and gradients
            for (let y = 0; y < canvas.height; y += 3 * scale) {
                // Alternating light and dark lines for satin sheen
                if ((y / (3 * scale)) % 2 === 0) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                } else {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                }
                ctx.fillRect(0, y, canvas.width, 2 * scale);
            }
            
            // Add fabric texture with small random variations
            for (let i = 0; i < 2000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const brightness = Math.random() * 0.3;
                ctx.fillStyle = `rgba(0, 0, 0, ${(0.2 + brightness)})`;
                ctx.fillRect(x, y, Math.random() * 2 + 1, 1);
            }
            
            // Add subtle wave pattern for satin sheen
            for (let x = 0; x < canvas.width; x += 40 * scale) {
                const gradient = ctx.createLinearGradient(x, 0, x + 40 * scale, 0);
                gradient.addColorStop(0, 'rgba(100, 150, 255, 0)');
                gradient.addColorStop(0.5, 'rgba(100, 150, 255, 0.3)');
                gradient.addColorStop(1, 'rgba(100, 150, 255, 0)');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x, 0, 40 * scale, canvas.height);
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.LinearFilter;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            return texture;
        }

        // Create procedural crumpled fabric texture
        function createCrumpledFabricTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Base colors from the texture
            const mainColor = '#6edeff';      // Cyan main color
            const subColor = '#0d0dde';        // Dark blue sub color
            const bgColor = '#000700';         // Very dark green background
            
            // Fill with background
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Create crumpled fabric effect using noise-like pattern
            const scale = 2;
            
            // Create wrinkle patterns
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const width = Math.random() * 60 * scale + 20 * scale;
                const height = Math.random() * 40 * scale + 15 * scale;
                const angle = Math.random() * Math.PI;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                
                // Draw wrinkles with sub color
                ctx.strokeStyle = subColor;
                ctx.lineWidth = Math.random() * 2 + 0.5;
                ctx.globalAlpha = Math.random() * 0.5 + 0.3;
                ctx.beginPath();
                ctx.ellipse(0, 0, width, height, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.restore();
            }
            
            // Add main fabric color with crumpled effect
            for (let i = 0; i < 50; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radius = Math.random() * 40 * scale + 10 * scale;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                gradient.addColorStop(0, mainColor);
                gradient.addColorStop(0.7, 'rgba(110, 222, 255, 0.5)');
                gradient.addColorStop(1, bgColor);
                
                ctx.fillStyle = gradient;
                ctx.globalAlpha = 0.6;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Add fabric texture grain
            for (let i = 0; i < 2000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const brightness = Math.random();
                ctx.globalAlpha = brightness * 0.3;
                
                if (brightness > 0.5) {
                    ctx.fillStyle = mainColor;
                } else {
                    ctx.fillStyle = subColor;
                }
                
                ctx.fillRect(x, y, Math.random() * 1 + 0.5, Math.random() * 1 + 0.5);
            }
            
            ctx.globalAlpha = 1.0;
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.LinearFilter;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            return texture;
        }

        function addWallPlanes(child, mat) {
            child.updateWorldMatrix(true, false);
            child.visible = false;  // Hide the actual wall

            const bbox = new THREE.Box3().setFromObject(child);
            const size = bbox.getSize(new THREE.Vector3());
            const center = bbox.getCenter(new THREE.Vector3());

            const minAxis = size.x < size.z ? 'x' : 'z';
            const planeW = minAxis === 'x' ? size.z : size.x;
            const planeH = size.y;

            // Only create one plane on the positive side
            const side = 1;
            const planeGeom = new THREE.PlaneGeometry(planeW, planeH);
            // Clone material and apply clipping plane if it exists
            const planeMat = mat.clone();
            if (modelClippingPlane) {
                planeMat.clippingPlanes = [...(planeMat.clippingPlanes || []), modelClippingPlane];
            }
            const planeMesh = new THREE.Mesh(planeGeom, planeMat);
            planeMesh.position.copy(center);

            if (minAxis === 'x') {
                planeMesh.rotation.y = side === 1 ? Math.PI / 2 : -Math.PI / 2;
                planeMesh.position.x += side * (size.x / 2);
            } else {
                planeMesh.rotation.y = side === -1 ? Math.PI : 0;
                planeMesh.position.z += side * (size.z / 2);
            }

            if(child.name=="Wall11"){
                planeMesh.position.x -= 1;
                planeMesh.position.z += .3;
            }
            else if(child.name=="Wall2"){
                planeMesh.position.z += .6;
                planeMesh.scale.set(1.02,1,1);
            }
            else if(child.name=="Wall8"){
                planeMesh.position.z -= .2;
            }
            else if(child.name=="Wall10"){
                planeMesh.position.x += .05;
                planeMesh.position.z += .5;
            }
            else if(child.name=="Wall1"){
                planeMesh.position.x -= .4;
                planeMesh.scale.set(.98,1,1);
            }
            else if(child.name=="Wall0"){
                planeMesh.position.x += .65;
                planeMesh.position.z += .3;
                planeMesh.scale.set(1,1,1);
            }
            else if(child.name=="Wall16"){
                planeMesh.position.x -= .4;
            }
            else if(child.name=="Wall5"){
                planeMesh.position.x -= .4;
                planeMesh.scale.set(1.02,1,1);
            }
            scene.add(planeMesh);
        }

        function addB2SeatToScene() {
            if (!b2SeatModel) {
                console.warn('b2Seat model not loaded yet');
                return;
            }

            // Clone and add the b2Seat model to the scene
            const clonedB2Seat = b2SeatModel.clone();
            clonedB2Seat.position.set(20, 2, -120);
            clonedB2Seat.rotation.y = 225 * (Math.PI / 180);
            clonedB2Seat.scale.set(12, 12, 12);
            
            // Apply satin texture to b2Seat
            clonedB2Seat.traverse((child) => {
                if (child.isMesh) {
                    child.material = sofaMaterial;
                }
            });
            
            scene.add(clonedB2Seat);
            
            console.log('Added b2Seat model to scene');
        }


        function replaceWindowsWithModel(model) {
            if (!windowModel) {
                console.warn('Window model not loaded yet');
                return;
            }

            model.traverse((child) => {
                if (child.isMesh) {
                    const name = child.name.toLowerCase();
                    if (name.includes('window') || name.includes('glass')) {
                        // Get the window mesh's world transform
                        child.updateWorldMatrix(true, false);
                        const bbox = new THREE.Box3().setFromObject(child);
                        const size = bbox.getSize(new THREE.Vector3());
                        const center = bbox.getCenter(new THREE.Vector3());

                        // Determine which axis is the thin/normal axis
                        const minAxis = size.x < size.z ? 'x' : 'z';
                        const offset = 0.5;

                        // Add window models on both sides (inside and outside)
                        [-1, 1].forEach((side) => {
                            // Clone window without clipping planes
                            const clonedWindow = windowModel.clone();
                            clonedWindow.applyMatrix4(child.matrixWorld);
                            clonedWindow.scale.set(13, 13, 13);
                            clonedWindow.rotation.x = Math.PI; // Rotate 180 degrees to face the correct direction    
                            // Offset the window slightly in the normal direction
                            if (minAxis === 'x') {
                                clonedWindow.position.x += side * offset;
                            } else {
                                clonedWindow.position.z += side * offset;
                            }

                           // clonedWindow.position.x += 3; // Adjust for model's original position
                           // clonedWindow.position.y -= 3; // Adjust for model's original position
                            // Remove clipping planes from all window materials
                            clonedWindow.traverse((childWindow) => {
                                if (childWindow.isMesh && childWindow.material) {
                                    const mats = Array.isArray(childWindow.material) ? childWindow.material : [childWindow.material];
                                    mats.forEach(mat => {
                                        if (mat) {
                                            mat.clippingPlanes = null;
                                        }
                                    });
                                }
                            });

                            scene.add(clonedWindow);
                        });
                        
                        console.log('Added window models to:', child.name);
                    }
                }
            });
        }

        function colorizeModel(model) {
            model.traverse((child) => {
                if (child.isMesh) {
                    const name = child.name.toLowerCase();

                    if (child.name === 'Opening0') {
                        child.material = skyBlueMaterial;
                        child.visible = true;
                        child.scale.set(1.2, 2.2, .05); // Elongate the pedestal to better fit the opening
                       // child.position.x -= 0.02; // Slightly raise the pedestal to prevent z-fighting
                    } else if (child.name === 'Door0' || child.name === 'Door1') {
                        child.visible = false;
                    } else if (child.name === 'Wall3' || child.name === 'Wall4') {
                        child.visible = false;
                    } else if (child.name === 'Wall11') {
                        child.material = whiteMaterial;
                        addWallPlanes(child, wallpaperMaterial);
                    }
                    else if (child.name === 'Wall16') {
                        child.material = whiteMaterial;
                        addWallPlanes(child, wallpaperMaterial);
                    } else if (name.includes('door') && name.includes('wall16')) {
                        child.visible = false;
                    } else if (name.includes('door')) {
                        child.material = yellowMaterial;
                    } else if (name.includes('window') || name.includes('glass')) {
                        child.material = greenMaterial;
                    } else if (child.name === 'Wall1') {
                        child.material = whiteMaterial;
                        addWallPlanes(child, wall1Material);
                    } else {
                        child.material = whiteMaterial;
                        addWallPlanes(child, wallpaperMaterial);
                    }
                }
            });
        }

        // =====================================================
        // WALL VISUALIZATION FOR DEBUGGING
        // =====================================================
        
        function visualizeWalls(model) {
            wallVisuals.clear();
            
            model.traverse((child) => {
                if (child.isMesh) {
                    const bbox = new THREE.Box3().setFromObject(child);
                    const size = bbox.getSize(new THREE.Vector3());
                    const center = bbox.getCenter(new THREE.Vector3());
                    
                    // Detect walls - tall structures
                    if (size.y > 5 && (size.x > 1 || size.z > 1)) {
                        // Draw red wireframe box around wall
                        const wireframeGeom = new THREE.BoxGeometry(size.x, size.y, size.z);
                        const wireframeMat = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 2 });
                        const edges = new THREE.EdgesGeometry(wireframeGeom);
                        const wireframe = new THREE.LineSegments(edges, wireframeMat);
                        
                        wireframe.position.copy(center);
                        wallVisuals.add(wireframe);
                        
                        console.log('Visualizing wall:', child.name, 'Size:', size, 'Center:', center);
                    }
                }
            });
        }

        // =====================================================
        // DEBUG MODE - Labels for walls, doors, windows
        // =====================================================
        
        let debugLabelsGroup = new THREE.Group();
        scene.add(debugLabelsGroup);
        let debugMode = false;
        
        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }
        
        function createLabel(position, text) {
            const texture = createTextTexture(text);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.position.copy(position);
            sprite.scale.set(10, 2.5, 1);
            return sprite;
        }
        
        function updateDebugLabels(model) {
            debugLabelsGroup.clear();
            if (!debugMode) return;
            
            model.traverse((child) => {
                if (child.isMesh) {
                    const name = child.name.toLowerCase();
                    const bbox = new THREE.Box3().setFromObject(child);
                    const center = bbox.getCenter(new THREE.Vector3());
                    center.y += 33; // Raise labels above the objects
                    
                    if (name.includes('door')) {
                        const label = createLabel(center, 'Door: ' + child.name);
                        debugLabelsGroup.add(label);
                    } else if (name.includes('window') || name.includes('glass')) {
                        const label = createLabel(center, 'Window: ' + child.name);
                        debugLabelsGroup.add(label);
                    } else if (name.includes('wall') || name.includes('panel')) {
                        const label = createLabel(center, 'Wall: ' + child.name);
                        debugLabelsGroup.add(label);
                    }
                }
            });
        }

        // =====================================================
        // COLLISION DETECTION
        // =====================================================
        
        function checkCollision(x, z) {
            // Player collision radius (for proximity checking)
            const playerRadius = 1.5;
            
            // Check ground bounds
            const groundMinX = -1 - 87 / 2;  // -44.5
            const groundMaxX = -1 + 87 / 2;  // 42.5
            const groundMinZ = -45 - 185 / 2; // -137.5
            const groundMaxZ = -45 + 185 / 2; // 47.5
            
            // Return true if outside ground bounds (collision detected)
            if (x < groundMinX || x > groundMaxX || z < groundMinZ || z > groundMaxZ) {
                return true;
            }
            
            // Check collision with walls
            for (let wall of wallColliders) {
                // Expand wall box by player radius for collision detection
                const expandedMin = new THREE.Vector3(
                    wall.min.x - playerRadius,
                    wall.min.y,
                    wall.min.z - playerRadius
                );
                const expandedMax = new THREE.Vector3(
                    wall.max.x + playerRadius,
                    wall.max.y,
                    wall.max.z + playerRadius
                );
                
                // Check if camera position is inside expanded wall box
                if (x >= expandedMin.x && x <= expandedMax.x &&
                    z >= expandedMin.z && z <= expandedMax.z) {
                    return true; // Collision detected
                }
            }
            
            return false; // No collision
        }

        // =====================================================
        // CUSTOM POINTER LOCK CONTROLS
        // =====================================================
        
        let pitch = 0;
        let yaw = 0;
        
        const pointerSpeed = 0.003;
        
        document.addEventListener('click', () => {
            if (currentMode === 'game') {
                document.body.requestPointerLock();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = !!document.pointerLockElement;
            if (isLocked) {
                document.getElementById('info').style.opacity = '0.3';
            } else {
                document.getElementById('info').style.opacity = '1';
            }
        });

        document.addEventListener('mousemove', (event) => {
            if (currentMode === 'game') {
                if (!isLocked) return;
                
                yaw -= event.movementX * pointerSpeed;
                pitch -= event.movementY * pointerSpeed;
                
                // Clamp pitch to prevent flipping
                const PI_2 = Math.PI / 2;
                pitch = Math.max(-PI_2, Math.min(PI_2, pitch));
                
                // Apply rotation using Euler angles
                const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
                camera.quaternion.setFromEuler(euler);
                
                // Mark scene as needing render
                needsRender = true;
            } else {
                // Explore mode: rotate by default, shift+drag to pan
                if (event.buttons === 1) {
                    const deltaMove = new THREE.Vector2(
                        event.clientX - lastExploreMousePos.x,
                        event.clientY - lastExploreMousePos.y
                    );
                    
                    if (event.shiftKey) {
                        // Shift + drag - pan
                        exploreCameraPan.x -= deltaMove.x * 0.02;
                        exploreCameraPan.y += deltaMove.y * 0.02;
                    } else {
                        // Default drag - rotate around object
                        exploreRotation.x += deltaMove.y * 0.005;
                        exploreRotation.y += deltaMove.x * 0.005;
                        // Restrict to top hemisphere (0 to ~90 degrees)
                        exploreRotation.x = Math.max(0, Math.min(1.4, exploreRotation.x));
                    }
                    needsRender = true;
                }
                lastExploreMousePos.set(event.clientX, event.clientY);
            }
        });
        
        document.addEventListener('wheel', (event) => {
            if (currentMode === 'explore') {
                event.preventDefault();
                const zoomSpeed = 20;
                exploreCameraDistance += event.deltaY * 0.01 * zoomSpeed;
                exploreCameraDistance = Math.max(5, Math.min(200, exploreCameraDistance));
                needsRender = true;
            }
        }, { passive: false });
        
        // Touch support for explore mode
        let lastTouchDistance = 0;
        let lastTouchPos = new THREE.Vector2(0, 0);
        
        document.addEventListener('touchmove', (event) => {
            if (currentMode !== 'explore') return;
            event.preventDefault();
            
            if (event.touches.length === 2) {
                // Two-finger touch - rotate and pinch to zoom
                const touch1 = event.touches[0];
                const touch2 = event.touches[1];
                const midX = (touch1.clientX + touch2.clientX) / 2;
                const midY = (touch1.clientY + touch2.clientY) / 2;
                
                // Calculate distance for pinch zoom
                const currentDistance = Math.hypot(
                    touch2.clientX - touch1.clientX,
                    touch2.clientY - touch1.clientY
                );
                
                if (lastTouchDistance > 0) {
                    const distanceDelta = lastTouchDistance - currentDistance;
                    exploreCameraDistance += distanceDelta * 0.1;
                    exploreCameraDistance = Math.max(5, Math.min(200, exploreCameraDistance));
                }
                lastTouchDistance = currentDistance;
                
                // Rotate based on movement
                const deltaMove = new THREE.Vector2(
                    midX - lastTouchPos.x,
                    midY - lastTouchPos.y
                );
                
                exploreRotation.x += deltaMove.y * 0.005;
                exploreRotation.y += deltaMove.x * 0.005;
                // Restrict to top hemisphere (0 to ~90 degrees)
                exploreRotation.x = Math.max(0, Math.min(1.4, exploreRotation.x));
                lastTouchPos.set(midX, midY);
                needsRender = true;
            } else if (event.touches.length === 1) {
                // Single finger - pan with shift-like behavior
                const touch = event.touches[0];
                const deltaMove = new THREE.Vector2(
                    touch.clientX - lastTouchPos.x,
                    touch.clientY - lastTouchPos.y
                );
                
                exploreCameraPan.x -= deltaMove.x * 0.02;
                exploreCameraPan.y += deltaMove.y * 0.02;
                lastTouchPos.set(touch.clientX, touch.clientY);
                needsRender = true;
            }
        }, { passive: false });
        
        document.addEventListener('touchstart', (event) => {
            if (currentMode !== 'explore') return;
            
            if (event.touches.length === 2) {
                // Calculate initial distance for pinch zoom
                const touch1 = event.touches[0];
                const touch2 = event.touches[1];
                lastTouchDistance = Math.hypot(
                    touch2.clientX - touch1.clientX,
                    touch2.clientY - touch1.clientY
                );
                lastTouchPos.set(
                    (touch1.clientX + touch2.clientX) / 2,
                    (touch1.clientY + touch2.clientY) / 2
                );
            } else if (event.touches.length === 1) {
                const touch = event.touches[0];
                lastTouchPos.set(touch.clientX, touch.clientY);
            }
        });
        
        document.addEventListener('touchend', (event) => {
            if (event.touches.length < 2) {
                lastTouchDistance = 0;
            }
        });

        // Movement
        const moveSpeed = 0.15;
        const turnSpeed = 0.04;

        const moveState = {
            forward: false,
            backward: false,
            left: false,
            right: false
        };

        document.addEventListener('keydown', (event) => {
            if (currentMode === 'game') {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW':
                        moveState.forward = true;
                        break;
                    case 'ArrowDown':
                    case 'KeyS':
                        moveState.backward = true;
                        break;
                    case 'ArrowLeft':
                    case 'KeyA':
                        moveState.left = true;
                        break;
                    case 'ArrowRight':
                    case 'KeyD':
                        moveState.right = true;
                        break;
                }
            }
            if (event.code === 'Escape') {
                if (document.pointerLockElement) {
                    document.exitPointerLock();
                }
            }
        });

        document.addEventListener('keyup', (event) => {
            if (currentMode === 'game') {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW':
                        moveState.forward = false;
                        break;
                    case 'ArrowDown':
                    case 'KeyS':
                        moveState.backward = false;
                        break;
                    case 'ArrowLeft':
                    case 'KeyA':
                        moveState.left = false;
                        break;
                    case 'ArrowRight':
                    case 'KeyD':
                        moveState.right = false;
                        break;
                }
            }
        });

        // =====================================================
        // ANIMATION LOOP
        // =====================================================
        
        let prevTime = performance.now();

        function updateCamera(delta) {
            if (currentMode === 'game') {
                let moveStep = 0;
                let turned = false;
                
                // Forward/backward movement in facing direction
                if (moveState.forward) moveStep -= moveSpeed * delta * 60;
                if (moveState.backward) moveStep += moveSpeed * delta * 60;
                
                if (moveStep !== 0) {
                    const nextX = camera.position.x + Math.sin(yaw) * moveStep;
                    const nextZ = camera.position.z + Math.cos(yaw) * moveStep;
                    
                    // Check collision before moving
                    if (!checkCollision(nextX, nextZ)) {
                        camera.position.x = nextX;
                        camera.position.z = nextZ;
                        needsRender = true;
                    }
                }
                
                // Turn left/right
                if (moveState.left) {
                    yaw += turnSpeed * delta * 60;
                    turned = true;
                    needsRender = true;
                }
                if (moveState.right) {
                    yaw -= turnSpeed * delta * 60;
                    turned = true;
                    needsRender = true;
                }
                
                // Update camera rotation if turned
                if (turned || moveStep !== 0) {
                    const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
                    camera.quaternion.setFromEuler(euler);
                }
                
                // Keep camera at eye height
                camera.position.y = 5;
            } else {
                // Explore mode: orbit camera around center
                const centerX = exploreCameraPan.x;
                const centerY = 5; // Look at around eye height
                const centerZ = exploreCameraPan.y;
                
                const x = centerX + Math.sin(exploreRotation.y) * Math.cos(exploreRotation.x) * exploreCameraDistance;
                const y = centerY + Math.sin(exploreRotation.x) * exploreCameraDistance;
                const z = centerZ + Math.cos(exploreRotation.y) * Math.cos(exploreRotation.x) * exploreCameraDistance;
                
                camera.position.set(x, y, z);
                camera.lookAt(centerX, centerY, centerZ);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (currentMode === 'game') {
                if (isLocked) {
                    updateCamera(delta);
                }
            } else {
                // Explore mode: only update camera and render if state changed
                if (needsRender) {
                    updateCamera(delta);
                }
            }

            // Render if needed
            if (needsRender) {
                renderer.render(scene, camera);
                needsRender = false;
            }

            prevTime = time;
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            needsRender = true;
        });

        // Hide loading and start
        document.getElementById('loading').style.display = 'none';
        animate();
    </script>
</body>
</html>
