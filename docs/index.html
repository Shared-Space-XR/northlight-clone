<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northlight Gallery - 3D Environment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            max-width: 300px;
        }
        #info h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        #info p {
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 5px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 200;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>Northlight Gallery</h2>
        <p><strong>Controls:</strong></p>
        <p>WASD / Arrow Keys - Move</p>
        <p>Mouse - Look around</p>
        <p>Click to enable controls</p>
        <p>ESC - Release mouse</p>
    </div>
    <div id="loading">Loading...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue

        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 30); // 5ft eye height (scaled)

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Scale: 1 unit = 1 foot
        const WALL_HEIGHT = 12; // 12 feet tall walls
        const WALL_THICKNESS = 0.5;

        // Materials
        const wallMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,
            roughness: 0.9,
            metalness: 0.0
        });
        
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x8B7355,
            roughness: 0.8,
            metalness: 0.1
        });

        const ceilingMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xf5f5f5,
            roughness: 0.9,
            metalness: 0.0
        });

        const beamMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x5C4033,
            roughness: 0.7,
            metalness: 0.1
        });

        const ductMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xC0C0C0,
            roughness: 0.4,
            metalness: 0.9
        });

        // Helper function to create walls
        function createWall(x, z, width, depth, height = WALL_HEIGHT) {
            const geometry = new THREE.BoxGeometry(width, height, depth);
            const wall = new THREE.Mesh(geometry, wallMaterial);
            wall.position.set(x, height / 2, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            return wall;
        }

        // Create floor
        function createFloor(x, z, width, depth) {
            const geometry = new THREE.BoxGeometry(width, 0.2, depth);
            const floor = new THREE.Mesh(geometry, floorMaterial);
            floor.position.set(x, 0, z);
            floor.receiveShadow = true;
            return floor;
        }

        // Create false ceiling with beams and ducts
        function createFalseCeiling(x, z, width, depth) {
            const group = new THREE.Group();
            
            // False ceiling panel
            const ceilingGeometry = new THREE.BoxGeometry(width, 0.2, depth);
            const ceiling = new THREE.Mesh(ceilingGeometry, ceilingMaterial);
            ceiling.position.set(0, 0, 0);
            ceiling.receiveShadow = true;
            group.add(ceiling);
            
            // Wooden beams (main perimeter beams)
            const beamHeight = 0.8;
            const beamWidth = 0.4;
            
            // Perimeter beams
            // North beam
            const northBeamGeom = new THREE.BoxGeometry(width, beamHeight, beamWidth);
            const northBeam = new THREE.Mesh(northBeamGeom, beamMaterial);
            northBeam.position.set(0, -beamHeight/2, -depth/2 + beamWidth/2);
            northBeam.castShadow = true;
            group.add(northBeam);
            
            // South beam
            const southBeam = new THREE.Mesh(northBeamGeom, beamMaterial);
            southBeam.position.set(0, -beamHeight/2, depth/2 - beamWidth/2);
            southBeam.castShadow = true;
            group.add(southBeam);
            
            // East beam
            const eastBeamGeom = new THREE.BoxGeometry(beamWidth, beamHeight, depth);
            const eastBeam = new THREE.Mesh(eastBeamGeom, beamMaterial);
            eastBeam.position.set(width/2 - beamWidth/2, -beamHeight/2, 0);
            eastBeam.castShadow = true;
            group.add(eastBeam);
            
            // West beam
            const westBeam = new THREE.Mesh(eastBeamGeom, beamMaterial);
            westBeam.position.set(-width/2 + beamWidth/2, -beamHeight/2, 0);
            westBeam.castShadow = true;
            group.add(westBeam);
            
            // Interior cross beams (grid pattern)
            const spacing = 8; // Beams every 8 feet
            for (let i = -Math.floor(width/2); i <= Math.floor(width/2); i += spacing) {
                if (Math.abs(i) > beamWidth) { // Skip if overlapping with perimeter
                    const crossBeamGeom = new THREE.BoxGeometry(beamWidth, beamHeight, depth);
                    const crossBeam = new THREE.Mesh(crossBeamGeom, beamMaterial);
                    crossBeam.position.set(i, -beamHeight/2, 0);
                    crossBeam.castShadow = true;
                    group.add(crossBeam);
                }
            }
            
            // AC Ducts (rectangular metal ducts running through ceiling)
            const ductWidth = 1.2;
            const ductHeight = 0.6;
            
            // Main duct running lengthwise
            const mainDuctGeom = new THREE.BoxGeometry(ductWidth, ductHeight, depth);
            const mainDuct = new THREE.Mesh(mainDuctGeom, ductMaterial);
            mainDuct.position.set(0, -beamHeight - 0.3, 0);
            mainDuct.castShadow = true;
            group.add(mainDuct);
            
            // Side ducts
            const sideDuctGeom = new THREE.BoxGeometry(ductWidth, ductHeight, depth);
            const sideDuct1 = new THREE.Mesh(sideDuctGeom, ductMaterial);
            sideDuct1.position.set(-width/3, -beamHeight - 0.3, 0);
            sideDuct1.castShadow = true;
            group.add(sideDuct1);
            
            const sideDuct2 = new THREE.Mesh(sideDuctGeom, ductMaterial);
            sideDuct2.position.set(width/3, -beamHeight - 0.3, 0);
            sideDuct2.castShadow = true;
            group.add(sideDuct2);
            
            // Mini ducts running across (branch ducts)
            const branchSpacing = 6;
            for (let i = -Math.floor(depth/2); i <= Math.floor(depth/2); i += branchSpacing) {
                const branchDuctGeom = new THREE.BoxGeometry(width * 0.6, 0.4, ductWidth);
                const branchDuct = new THREE.Mesh(branchDuctGeom, ductMaterial);
                branchDuct.position.set(0, -beamHeight - 0.5, i);
                branchDuct.castShadow = true;
                group.add(branchDuct);
            }
            
            group.position.set(x, WALL_HEIGHT, z);
            return group;
        }

        // =====================================================
        // NORTHLIGHT GALLERY FLOOR PLAN
        // Based on the measurements from the floor plan image
        // =====================================================

        // Main dimensions from floor plan (in feet):
        // Left section: 20ft x 16.4ft (320 sq ft) + extension 50.9 linear ft (520 sq ft)
        // Center section: 20.6ft width, corridor area
        // Right sections: Various rooms totaling ~600+ sq ft

        // LEFT GALLERY SECTION (320 sq ft + 520 sq ft)
        // Upper left room: ~20ft x 16ft
        const leftRoom1Width = 20;
        const leftRoom1Depth = 16.4;
        
        // Lower left extension: ~9ft x 14ft (520 sq ft area)
        const leftRoom2Width = 9;
        const leftRoom2Depth = 14;

        // Create Left Gallery floors
        scene.add(createFloor(-28, -8, leftRoom1Width, leftRoom1Depth + leftRoom2Depth));
        scene.add(createFalseCeiling(-28, -8, leftRoom1Width, leftRoom1Depth + leftRoom2Depth));

        // Left gallery walls
        // Back wall (north)
        scene.add(createWall(-28, -leftRoom1Depth - leftRoom2Depth/2 + 5, leftRoom1Width + 1, WALL_THICKNESS));
        // Left wall (west)
        scene.add(createWall(-38, -8, WALL_THICKNESS, leftRoom1Depth + leftRoom2Depth + 2));
        // Front partial wall
        scene.add(createWall(-30, 8, 16, WALL_THICKNESS));

        // CENTER CORRIDOR / MAIN GALLERY (535 sq ft - 76 linear feet)
        const centerWidth = 20.6;
        const centerDepth = 26;

        scene.add(createFloor(-8, 0, centerWidth, centerDepth + 10));
        scene.add(createFalseCeiling(-8, 0, centerWidth, centerDepth + 10));

        // Center section walls
        // Back wall
        scene.add(createWall(-8, -18, centerWidth + 1, WALL_THICKNESS));

        // RIGHT GALLERY SECTIONS
        // Upper right: 47.6 linear ft, 204 sq ft (~17ft x 12ft)
        const rightRoom1Width = 17;
        const rightRoom1Depth = 12;

        // Lower right: 50 linear ft, 338 sq ft
        const rightRoom2Width = 17;
        const rightRoom2Depth = 20;

        // Right gallery floors
        scene.add(createFloor(12, -5, rightRoom1Width + rightRoom2Width, rightRoom1Depth + 8));
        scene.add(createFalseCeiling(12, -5, rightRoom1Width + rightRoom2Width, rightRoom1Depth + 8));

        scene.add(createFloor(18, 12, rightRoom2Width, rightRoom2Depth - 5));
        scene.add(createFalseCeiling(18, 12, rightRoom2Width, rightRoom2Depth - 5));

        // Right section walls
        // East wall (right side)
        scene.add(createWall(28, 0, WALL_THICKNESS, centerDepth + 15));
        // North wall (back)
        scene.add(createWall(15, -18, 26, WALL_THICKNESS));

        // Interior dividing walls
        // Vertical divider in right section
        scene.add(createWall(8, -12, WALL_THICKNESS, 12));
        scene.add(createWall(18, 5, WALL_THICKNESS, 10));

        // Front wall with entrance opening
        scene.add(createWall(-25, 18, 25, WALL_THICKNESS));
        scene.add(createWall(15, 18, 25, WALL_THICKNESS));

        // Additional architectural details
        // Column/pillar in center
        const pillarGeometry = new THREE.BoxGeometry(1, WALL_HEIGHT, 1);
        const pillar1 = new THREE.Mesh(pillarGeometry, wallMaterial);
        pillar1.position.set(-18, WALL_HEIGHT/2, 0);
        pillar1.castShadow = true;
        scene.add(pillar1);

        const pillar2 = new THREE.Mesh(pillarGeometry, wallMaterial);
        pillar2.position.set(-18, WALL_HEIGHT/2, -10);
        pillar2.castShadow = true;
        scene.add(pillar2);

        // =====================================================
        // ROOF ENCLOSURE (above false ceiling)
        // =====================================================
        
        const roofMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x8B8680,
            roughness: 0.7,
            metalness: 0.1
        });

        const roofThickness = 0.3;
        const roofHeight = WALL_HEIGHT + roofThickness;

        // Roof for left gallery section
        const leftRoofGeometry = new THREE.BoxGeometry(20, roofThickness, leftRoom1Depth + leftRoom2Depth);
        const leftRoof = new THREE.Mesh(leftRoofGeometry, roofMaterial);
        leftRoof.position.set(-28, roofHeight, -8);
        leftRoof.castShadow = true;
        leftRoof.receiveShadow = true;
        scene.add(leftRoof);

        // Roof for center corridor
        const centerRoofGeometry = new THREE.BoxGeometry(centerWidth, roofThickness, centerDepth + 10);
        const centerRoof = new THREE.Mesh(centerRoofGeometry, roofMaterial);
        centerRoof.position.set(-8, roofHeight, 0);
        centerRoof.castShadow = true;
        centerRoof.receiveShadow = true;
        scene.add(centerRoof);

        // Roof for right gallery main section
        const rightRoof1Geometry = new THREE.BoxGeometry(rightRoom1Width + rightRoom2Width, roofThickness, rightRoom1Depth + 8);
        const rightRoof1 = new THREE.Mesh(rightRoof1Geometry, roofMaterial);
        rightRoof1.position.set(12, roofHeight, -5);
        rightRoof1.castShadow = true;
        rightRoof1.receiveShadow = true;
        scene.add(rightRoof1);

        // Roof for right gallery upper section
        const rightRoof2Geometry = new THREE.BoxGeometry(rightRoom2Width, roofThickness, rightRoom2Depth - 5);
        const rightRoof2 = new THREE.Mesh(rightRoof2Geometry, roofMaterial);
        rightRoof2.position.set(18, roofHeight, 12);
        rightRoof2.castShadow = true;
        rightRoof2.receiveShadow = true;
        scene.add(rightRoof2);

        // Exterior ground
        const groundGeometry = new THREE.PlaneGeometry(200, 200);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x3d5c3d,
            roughness: 0.9
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        ground.receiveShadow = true;
        scene.add(ground);

        // =====================================================
        // ARTWORK FRAMES (Gallery displays)
        // =====================================================
        
        const frameMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x2c2c2c,
            roughness: 0.5
        });
        
        const textureLoader = new THREE.TextureLoader();
        
        function createArtwork(x, y, z, width, height, rotationY = 0, imagePath = 'art/art1.jpg') {
            const group = new THREE.Group();
            
            // Frame
            const frameGeometry = new THREE.BoxGeometry(width + 0.3, height + 0.3, 0.15);
            const frame = new THREE.Mesh(frameGeometry, frameMaterial);
            group.add(frame);
            
            // Canvas with image texture
            textureLoader.load(imagePath, (texture) => {
                const canvasMaterial = new THREE.MeshStandardMaterial({ 
                    map: texture,
                    roughness: 0.3
                });
                const canvasGeometry = new THREE.BoxGeometry(width, height, 0.1);
                const canvas = new THREE.Mesh(canvasGeometry, canvasMaterial);
                canvas.position.z = 0.05;
                group.add(canvas);
            });
            
            group.position.set(x, y, z);
            group.rotation.y = rotationY;
            return group;
        }

        // Artwork on walls
        const artworkPieces = [
            // Left gallery artworks
            { x: -37.5, y: 6, z: -5, width: 4, height: 3, rotationY: Math.PI / 2, image: 'art/art1.jpg' },
            { x: -37.5, y: 6, z: -15, width: 5, height: 4, rotationY: Math.PI / 2, image: 'art/art2.jpg' },
            { x: -28, y: 6, z: -22, width: 6, height: 4, rotationY: 0, image: 'art/art3.jpg' },
            // Center gallery artworks
            { x: 17, y: 6, z: 5, width: 2, height: 3, rotationY: -Math.PI / 2, image: 'art/art4.jpg' },
            // Right gallery artworks
            { x: 27.5, y: 6, z: -8, width: 5, height: 4, rotationY: -Math.PI / 2, image: 'art/art5.jpg' },
            { x: 27.5, y: 6, z: 5, width: 4, height: 3, rotationY: -Math.PI / 2, image: 'art/art6.jpg' },
            { x: 15, y: 6, z: -17.5, width: 6, height: 4, rotationY: 0, image: 'art/art7.jpg' }
        ];

        // Add artworks with spotlights
        artworkPieces.forEach((art) => {
            const artwork = createArtwork(art.x, art.y, art.z, art.width, art.height, art.rotationY, art.image);
            scene.add(artwork);

            // Add spotlight above each artwork
            const artworkSpotlight = new THREE.SpotLight(0xfff5e6, 1.2);
            artworkSpotlight.position.set(art.x, art.y + 3, art.z);
            artworkSpotlight.angle = Math.PI / 6;
            artworkSpotlight.penumbra = 0.5;
            artworkSpotlight.decay = 2;
            artworkSpotlight.distance = 20;
            artworkSpotlight.castShadow = false;
            artworkSpotlight.target.position.set(art.x, art.y, art.z);
            scene.add(artworkSpotlight);
            scene.add(artworkSpotlight.target);
        });

        // =====================================================
        // SCARFS DISPLAY - Right wall section
        // =====================================================
        
        const gltfLoader = new GLTFLoader();
        const scarfPaths = [
            'scarfs/scarf1.glb',
            'scarfs/scarf2.glb',
            'scarfs/scarf3.glb',
            'scarfs/scarf4.glb',
            'scarfs/scarf5.glb',
            'scarfs/scarf6.glb',
            'scarfs/scarf7.glb',
            'scarfs/scarf8.glb'
        ];

        // Hang scarfs in a straight line along back wall
        const scarfZ = -17; // Forward from back wall to make visible
        const scarfY = 5.5; // Chest height
        const scarfSpacing = 3.9; // Space between scarfs
        const scarfStartX = -29; // Starting x position

        scarfPaths.forEach((path, index) => {
            gltfLoader.load(path, (gltf) => {
                const scarf = gltf.scene;
                scarf.scale.set(3.8, 3.8, 3.8);
                
                // Position in a straight line
                scarf.position.set(
                    scarfStartX + (index * scarfSpacing),
                    scarfY,
                    scarfZ
                );
                
                // All face inward (toward the gallery)
                scarf.rotation.y = 0;
                
                // Enable shadows
                scarf.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                // Add point light above scarf
                const pointLight = new THREE.PointLight(0xffffff, 1.8, 15);
                const scarfX = scarfStartX + (index * scarfSpacing);
                pointLight.position.set(scarfX, 8, scarfZ);
                pointLight.castShadow = false;
                scene.add(pointLight);
                
                scene.add(scarf);
            }, undefined, (error) => {
                console.error('Error loading scarf:', path, error);
            });
        });

        // =====================================================
        // LIGHTING - Northlight style (natural light from above)
        // =====================================================
        
        // Primary ambient light for overall gallery illumination
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
        scene.add(ambientLight);

        // Soft fill light from left side
        const fillLightLeft = new THREE.DirectionalLight(0xfff8f0, 0.35);
        fillLightLeft.position.set(-40, 20, 0);
        scene.add(fillLightLeft);

        // Soft fill light from right side
        const fillLightRight = new THREE.DirectionalLight(0xfff8f0, 0.35);
        fillLightRight.position.set(40, 20, 0);
        scene.add(fillLightRight);

        // Main skylight effect (directional light from above)
        const skylight1 = new THREE.DirectionalLight(0xffffff, 0.9);
        skylight1.position.set(-20, 30, 0);
        skylight1.castShadow = true;
        skylight1.shadow.mapSize.width = 2048;
        skylight1.shadow.mapSize.height = 2048;
        skylight1.shadow.camera.near = 0.5;
        skylight1.shadow.camera.far = 100;
        skylight1.shadow.camera.left = -50;
        skylight1.shadow.camera.right = 50;
        skylight1.shadow.camera.top = 50;
        skylight1.shadow.camera.bottom = -50;
        scene.add(skylight1);

        const skylight2 = new THREE.DirectionalLight(0xffffff, 0.6);
        skylight2.position.set(10, 25, -10);
        scene.add(skylight2);

        // Additional ceiling lights for uniform gallery illumination
        const ceilingLight1 = new THREE.PointLight(0xfff5e6, 0.6, 40);
        ceilingLight1.position.set(-20, 11, -5);
        scene.add(ceilingLight1);

        const ceilingLight2 = new THREE.PointLight(0xfff5e6, 0.6, 40);
        ceilingLight2.position.set(10, 11, 5);
        scene.add(ceilingLight2);

        const ceilingLight3 = new THREE.PointLight(0xfff5e6, 0.5, 35);
        ceilingLight3.position.set(20, 11, -10);
        scene.add(ceilingLight3);

        // Spotlight for artwork lighting
        const spotLight1 = new THREE.SpotLight(0xfff5e6, 1);
        spotLight1.position.set(-28, 11, -15);
        spotLight1.angle = Math.PI / 6;
        spotLight1.penumbra = 0.5;
        spotLight1.target.position.set(-28, 5, -17);
        scene.add(spotLight1);
        scene.add(spotLight1.target);

        const spotLight2 = new THREE.SpotLight(0xfff5e6, 1);
        spotLight2.position.set(-8, 11, -10);
        spotLight2.angle = Math.PI / 6;
        spotLight2.penumbra = 0.5;
        spotLight2.target.position.set(-8, 5, -15);
        scene.add(spotLight2);
        scene.add(spotLight2.target);

        // =====================================================
        // SCULPTURE PEDESTALS
        // =====================================================
        
        const pedestalMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xf0f0f0,
            roughness: 0.3
        });

        function createPedestal(x, z) {
            const group = new THREE.Group();
            
            // Base
            const baseGeometry = new THREE.BoxGeometry(2, 3, 2);
            const base = new THREE.Mesh(baseGeometry, pedestalMaterial);
            base.position.y = 1.5;
            base.castShadow = true;
            base.receiveShadow = true;
            group.add(base);
            
            group.position.set(x, 0, z);
            return group;
        }

        // Create pedestals
        const pedestal1 = createPedestal(-28, -5);
        const pedestal2 = createPedestal(-8, -8);
        const pedestal3 = createPedestal(15, -5);
        
        scene.add(pedestal1);
        scene.add(pedestal2);
        scene.add(pedestal3);

        // Load rose sculptures on pedestals
        const rosePaths = ['roses/rose1.glb', 'roses/rose2.glb', 'roses/rose3.glb'];
        const pedestalPositions = [
            { group: pedestal1, x: -28, z: -5 },
            { group: pedestal2, x: -8, z: -8 },
            { group: pedestal3, x: 15, z: -5 }
        ];
        
        const loadedRoses = []; // Track loaded roses for animation

        rosePaths.forEach((path, index) => {
            gltfLoader.load(path, (gltf) => {
                const rose = gltf.scene;
                rose.scale.set(1.5, 1.5, 1.5);
                rose.position.y = 3.2; // On top of pedestal base
                
                // Enable shadows
                rose.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                // Store rose for rotation in animation loop
                loadedRoses.push(rose);
                
                pedestalPositions[index].group.add(rose);
                
                // Add spotlight for this sculpture (lit from above)
                const sculptureLight = new THREE.SpotLight(0xffffff, 2.5);
                sculptureLight.position.set(
                    pedestalPositions[index].x,
                    11,
                    pedestalPositions[index].z
                );
                sculptureLight.angle = Math.PI / 8;
                sculptureLight.penumbra = 0.4;
                sculptureLight.distance = 20;
                sculptureLight.castShadow = false;
                sculptureLight.target.position.set(
                    pedestalPositions[index].x,
                    3.5,
                    pedestalPositions[index].z
                );
                scene.add(sculptureLight);
                scene.add(sculptureLight.target);
            }, undefined, (error) => {
                console.error('Error loading rose:', path, error);
            });
        });

        // =====================================================
        // COLLISION DETECTION
        // =====================================================
        
        const collisionRadius = 1; // Player collision radius (1 foot)
        
        // Define collision boxes based on walls and obstacles
        const collisionBoxes = [
            // Left gallery walls
            { x: -28, z: -32, w: 20.5, d: 0.5 }, // Back wall
            { x: -38, z: -8, w: 0.5, d: 32 }, // Left wall
            { x: -22, z: 8.5, w: 16, d: 0.5 }, // Front partial wall
            
            // Center corridor back wall
            { x: -8, z: -18.5, w: 21, d: 0.5 },
            
            // Right section walls
            { x: 28.5, z: 0, w: 0.5, d: 30 }, // East wall
            { x: 15, z: -18.5, w: 26, d: 0.5 }, // North wall
            
            // Interior dividing walls
            { x: 8, z: -12, w: 0.5, d: 12 },
            { x: 18, z: 5, w: 0.5, d: 10 },
            
            // Front walls
            { x: -25, z: 18.5, w: 25, d: 0.5 },
            { x: 15, z: 18.5, w: 25, d: 0.5 },
            
            // Pillars (with radius)
            { x: -18, z: 0, w: 1.5, d: 1.5, isPillar: true },
            { x: -18, z: -10, w: 1.5, d: 1.5, isPillar: true },
            
            // Pedestals (with radius)
            { x: -28, z: -5, w: 2.5, d: 2.5, isPedestal: true },
            { x: -8, z: -8, w: 2.5, d: 2.5, isPedestal: true },
            { x: 15, z: -5, w: 2.5, d: 2.5, isPedestal: true },
        ];
        
        function checkCollision(x, z) {
            for (let box of collisionBoxes) {
                const dx = Math.abs(x - box.x);
                const dz = Math.abs(z - box.z);
                const closestX = Math.max(0, dx - box.w / 2 - collisionRadius);
                const closestZ = Math.max(0, dz - box.d / 2 - collisionRadius);
                
                if (closestX ** 2 + closestZ ** 2 < 0.01) {
                    return true; // Collision detected
                }
            }
            return false; // No collision
        }

        // =====================================================
        // CUSTOM POINTER LOCK CONTROLS
        // =====================================================
        
        let isLocked = false;
        let pitch = 0;
        let yaw = 0;
        
        const pointerSpeed = 0.003;
        
        document.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = !!document.pointerLockElement;
            if (isLocked) {
                document.getElementById('info').style.opacity = '0.3';
            } else {
                document.getElementById('info').style.opacity = '1';
            }
        });

        document.addEventListener('mousemove', (event) => {
            if (!isLocked) return;
            
            yaw -= event.movementX * pointerSpeed;
            pitch -= event.movementY * pointerSpeed;
            
            // Clamp pitch to prevent flipping
            const PI_2 = Math.PI / 2;
            pitch = Math.max(-PI_2, Math.min(PI_2, pitch));
            
            // Apply rotation using Euler angles
            const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
            camera.quaternion.setFromEuler(euler);
        });

        // Movement
        const moveSpeed = 0.15;
        const turnSpeed = 0.04;

        const moveState = {
            forward: false,
            backward: false,
            left: false,
            right: false
        };

        document.addEventListener('keydown', (event) => {
            switch (event.code) {
                case 'ArrowUp':
                case 'KeyW':
                    moveState.forward = true;
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    moveState.backward = true;
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    moveState.left = true;
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    moveState.right = true;
                    break;
            }
        });

        document.addEventListener('keyup', (event) => {
            switch (event.code) {
                case 'ArrowUp':
                case 'KeyW':
                    moveState.forward = false;
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    moveState.backward = false;
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    moveState.left = false;
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    moveState.right = false;
                    break;
            }
        });

        // =====================================================
        // ANIMATION LOOP
        // =====================================================
        
        let prevTime = performance.now();

        function updateCamera(delta) {
            let moveStep = 0;
            let turned = false;
            
            // Forward/backward movement in facing direction
            if (moveState.forward) moveStep -= moveSpeed * delta * 60;
            if (moveState.backward) moveStep += moveSpeed * delta * 60;
            
            if (moveStep !== 0) {
                const nextX = camera.position.x + Math.sin(yaw) * moveStep;
                const nextZ = camera.position.z + Math.cos(yaw) * moveStep;
                
                // Check collision before moving
                if (!checkCollision(nextX, nextZ)) {
                    camera.position.x = nextX;
                    camera.position.z = nextZ;
                }
            }
            
            // Turn left/right
            if (moveState.left) {
                yaw += turnSpeed * delta * 60;
                turned = true;
            }
            if (moveState.right) {
                yaw -= turnSpeed * delta * 60;
                turned = true;
            }
            
            // Update camera rotation if turned
            if (turned || moveStep !== 0) {
                const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
                camera.quaternion.setFromEuler(euler);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (isLocked) {
                updateCamera(delta);

                // Keep camera at eye height
                camera.position.y = 5;
            }

            // Rotate sculptures for visual interest
            loadedRoses.forEach(rose => {
                rose.rotation.y += 0.01;
            });

            prevTime = time;
            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Hide loading and start
        document.getElementById('loading').style.display = 'none';
        animate();
    </script>
</body>
</html>
